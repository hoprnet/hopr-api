toolchain:
  - changed-files:
      - any-glob-to-any-file:
          - flake.*
          - "*.nix"
          - .github/**
          - rust-toolchain.toml

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - Cargo.lock
          - "**/Cargo.toml"

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"

crate:hopr-api:
  - changed-files:
      - any-glob-to-any-file: api/**
