name: Zizmor
on:
  merge_group:
    types: [checks_requested]
  workflow_call:
    inputs:
      source_repo:
        required: true
        type: string
      source_branch:
        required: true
        type: string
concurrency:
  group: ${{ inputs.source_branch || github.ref_name }}-zizmor
  cancel-in-progress: true
permissions: {}
jobs:
  zizmor:
    name: Zizmor
    runs-on: self-hosted-hoprnet-bigger
    permissions:
      contents: read
      security-events: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Run zizmor
        uses: hoprnet/hopr-workflows/actions/nix-action@348f8878a2bc6e1f4f5be0e98ffc7b3f7a79cb67
        with:
          source_branch: ${{ inputs.source_branch }}
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          command: nix develop -L .#ci -c bash -c "zizmor --format sarif . > results.sarif"
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@45cbd0c69e560cd9e7cd7f8c32362050c9b7ded2 # v4.32.2
        with:
          sarif_file: results.sarif
          category: zizmor
