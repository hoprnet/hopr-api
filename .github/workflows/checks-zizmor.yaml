name: Zizmor
on:
  merge_group:
    types: [checks_requested]
  workflow_call:
    inputs:
      source_repo:
        required: true
        type: string
      source_branch:
        required: true
        type: string
concurrency:
  group: ${{ inputs.source_branch || github.ref_name }}-zizmor
  cancel-in-progress: true
permissions: {}
jobs:
  zizmor:
    name: Zizmor
    runs-on: self-hosted-hoprnet-bigger
    permissions:
      contents: read
      security-events: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Run zizmor
        uses: hoprnet/hopr-workflows/actions/nix-action@nix-action-v1
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_branch }}
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          command: nix develop -L .#ci -c bash -c "zizmor --format sarif . > results.sarif"

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@45cbd0c69e560cd9e7cd7f8c32362050c9b7ded2 # v4.32.2
        with:
          sarif_file: results.sarif
          category: zizmor
