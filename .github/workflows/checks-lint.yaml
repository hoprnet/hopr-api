name: Lint
env:
  RUST_BACKTRACE: "1"
on:
  merge_group:
    types: [checks_requested]
  workflow_call:
    inputs:
      source_repo:
        required: true
        type: string
      source_branch:
        required: true
        type: string
concurrency:
  group: ${{ inputs.source_branch || github.ref_name }}-lint
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  lint:
    name: Lint
    runs-on: self-hosted-hoprnet-bigger
    timeout-minutes: 30
    steps:
      - name: Run linter
        uses: hoprnet/hopr-workflows/actions/nix-action@9ffe6bb3713d11b1df070fb50546bb4321d8c693
        with:
          repository: ${{ inputs.source_repo || github.repository }}
          ref: ${{ inputs.source_branch || github.ref }}
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          command: nix run -L .#check
