name: Pre-commit
on:
  merge_group:
    types: [checks_requested]
  workflow_call:
    inputs:
      source_repo:
        required: true
        type: string
      source_branch:
        required: true
        type: string
concurrency:
  group: ${{ inputs.source_branch || github.ref_name }}-pre-commit
  cancel-in-progress: true
jobs:
  pre-commit:
    name: Pre-commit
    runs-on: self-hosted-hoprnet-small
    steps:
      - name: Run Pre-commit
        uses: hoprnet/hopr-workflows/actions/nix-action@c2aca7e56d25c4a786049ccf816c7f1af8721de8 # nix-action-v1
        with:
          source_branch: ${{ inputs.source_branch }}
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          command: nix build -L .#pre-commit-check
