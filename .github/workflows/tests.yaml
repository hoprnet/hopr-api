#################################################################################
# Pipeline triggered on every pull request to run unit and integration tests
#################################################################################
name: Test
env:
  RUST_BACKTRACE: "1"
on:
  merge_group:
    types: [checks_requested]
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
concurrency:
  group: ${{ github.event.pull_request.head.ref || github.ref_name }}-${{ github.workflow }}
  cancel-in-progress: true
jobs:
  tests-unit:
    name: Unit Tests
    runs-on: self-hosted-hoprnet-bigger
    timeout-minutes: 30
    env:
      CI: "true"
    steps:
      - name: Run unit tests
        uses: hoprnet/hopr-workflows/actions/nix-action@290ac3c27a2735cd4860b4a1b41c515cdb5a1feb
        with:
          source_branch: ${{ github.event.pull_request.head.ref || github.ref }}
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          command: nix develop -c cargo test --lib --all-features

